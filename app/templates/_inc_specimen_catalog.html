<div class="py-2">
  <p class="text-sm text-gray-500">{{ _('館號') }}</p>
  <p class="text-lg font-semibold text-gray-900">{{ data.specimen.catalog_number_verbose }}</p>
  {% if data.specimen.ark_id %}
  <p class="text-sm text-gray-600 mt-1">
    ARK: {{ data.specimen.ark_id }}
    <a href="https://arks.org/" target="_blank" rel="noopener" class="inline-block ml-1 text-gray-400 hover:text-green-700" title="{{ _('ARK (Archival Resource Key) 是一種持久識別碼，用於長期穩定地引用數位資源。點擊了解更多。') }}">
      <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
    </a>
  </p>
  {% endif %}
  {% if data.specimen.guid %}
  <p class="text-sm text-gray-600 mt-1">{{ _('引用網址') }}: <a href="{{ data.specimen.guid }}" class="text-green-700 hover:underline" target="_blank" rel="noopener">{{ data.specimen.guid }}</a></p>
  {% endif %}
</div>
